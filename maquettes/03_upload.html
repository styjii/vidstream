<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidStream — Upload</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#f5f5f3; --bg2:#ffffff; --bg3:#ebebea;
    --text:#1a1a19; --text2:#5a5a58; --text3:#9a9a98;
    --border:rgba(0,0,0,0.1); --border2:rgba(0,0,0,0.18);
    --accent:#E63946; --radius:8px; --radius-lg:12px;
    --success-bg:#EAF3DE; --success-text:#27500A;
    --info-bg:#E6F1FB; --info-text:#0C447C;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1a1a18; --bg2:#242422; --bg3:#2e2e2c; --text:#e8e8e6; --text2:#a0a09e; --text3:#686866; --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.18); --success-bg:#172e17; --success-text:#97C459; --info-bg:#0c1e2e; --info-text:#85B7EB; }
  }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 14px; padding: 0 20px; height: 52px; }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 16px; color: var(--text); text-decoration: none; }
  .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; }
  .main { max-width: 580px; margin: 36px auto; padding: 0 20px; }
  .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 26px 28px; }
  .card-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 18px; display: flex; align-items: center; gap: 9px; }
  .card-title i { font-size: 20px; color: var(--text2); }
  .server-info { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); margin-bottom: 20px; padding: 9px 14px; background: var(--success-bg); border-radius: var(--radius); }
  .server-info i { font-size: 16px; color: var(--success-text); }
  .drop-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius-lg); padding: 40px 20px; text-align: center; cursor: pointer; margin-bottom: 20px; transition: background .15s, border-color .15s; }
  .drop-zone:hover { background: var(--bg3); border-color: var(--accent); }
  .drop-icon { font-size: 40px; color: var(--text3); margin-bottom: 12px; }
  .drop-text { font-size: 14px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
  .drop-sub { font-size: 12px; color: var(--text3); }
  .drop-sub span { color: var(--info-text); cursor: pointer; text-decoration: underline; }
  .upload-list { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  .up-file { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--bg3); border-radius: var(--radius); }
  .up-file i { font-size: 22px; color: var(--text2); flex-shrink: 0; }
  .up-info { flex: 1; min-width: 0; }
  .up-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
  .up-size { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .up-bar { height: 3px; background: var(--border2); border-radius: 2px; }
  .up-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .up-pct { font-size: 12px; color: var(--text2); min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
  .up-done { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--success-bg); border-radius: var(--radius); }
  .up-done-info { flex: 1; }
  .up-done-name { font-size: 13px; font-weight: 500; color: var(--success-text); }
  .up-done-sub { font-size: 11px; color: var(--success-text); opacity: .7; margin-top: 2px; }
  .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .field input, .field select { width: 100%; padding: 0 11px; height: 36px; font-size: 13px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text); outline: none; transition: border-color .15s; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 8px 18px; font-size: 13px; color: var(--text2); cursor: pointer; transition: background .15s; }
  .btn-cancel:hover { background: var(--bg3); }
  .btn-upload { background: var(--accent); border: none; border-radius: var(--radius); padding: 8px 22px; font-size: 13px; color: #fff; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 7px; transition: opacity .15s; }
  .btn-upload:hover { opacity: .88; }
  .btn-upload i { font-size: 16px; }
</style>
</head>
<body>
<nav>
  <a class="logo" href="01_accueil.html"><div class="logo-icon"><i class="ti ti-player-play"></i></div>VidStream</a>
</nav>
<div class="main">
  <div class="card">
    <div class="card-title"><i class="ti ti-upload"></i>Envoyer une vidéo vers le serveur</div>
    <div class="server-info"><i class="ti ti-server"></i>Connecté à : 192.168.1.10 (PC principal) · Réseau LAN local</div>
    <div class="drop-zone">
      <div class="drop-icon"><i class="ti ti-file-upload"></i></div>
      <div class="drop-text">Glisser-déposer votre vidéo ici</div>
      <div class="drop-sub">ou <span>parcourir les fichiers</span> · mp4, mkv, avi, mov acceptés</div>
    </div>
    <div class="upload-list">
      <div class="up-file">
        <i class="ti ti-file-video"></i>
        <div class="up-info">
          <div class="up-name">vacances_madagascar_2024.mp4</div>
          <div class="up-size">1.4 Go · 62% envoyé</div>
          <div class="up-bar"><div class="up-fill" style="width:62%"></div></div>
        </div>
        <span class="up-pct">62%</span>
      </div>
      <div class="up-done">
        <i class="ti ti-circle-check" style="font-size:22px;color:var(--success-text);flex-shrink:0"></i>
        <div class="up-done-info">
          <div class="up-done-name">anniversaire_fête.mp4</div>
          <div class="up-done-sub">720 Mo · Envoyé avec succès</div>
        </div>
      </div>
    </div>
    <div class="fields-row">
      <div class="field"><label>Catégorie de destination</label><select><option>Films</option><option>Séries</option><option>Musique</option><option selected>Uploads</option><option>Autres</option></select></div>
      <div class="field"><label>Titre (optionnel)</label><input placeholder="Laisser vide = nom du fichier" /></div>
    </div>
    <div class="actions">
      <button class="btn-cancel">Annuler</button>
      <button class="btn-upload"><i class="ti ti-upload"></i>Envoyer</button>
    </div>
  </div>
</div>
</body>
</html>
